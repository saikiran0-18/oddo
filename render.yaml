services:
  - type: web
    name: transitops
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: transitops-db
          property: connectionString
      - key: ADMIN_EMAIL
        value: admin@transitops.com

databases:
  - name: transitops-db
    plan: free
